# Run unit tests on every push and PR. Gates merges on test passage.
---
name: "Tests"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'src/**'
      - 'test/**'
      - 'remote-ui.pro'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  QT_VERSION: "5.15.2"

jobs:
  unit-tests:
    name: "Unit tests (C++)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: ""

      - name: Build unit tests
        working-directory: test/matrixrain
        run: |
          qmake matrixrain_test.pro "QMAKE_CXXFLAGS += -fsanitize=address -fno-omit-frame-pointer" "QMAKE_LFLAGS += -fsanitize=address"
          make -j$(nproc)

      - name: Run unit tests
        working-directory: test/matrixrain
        run: ./test_matrixrain -v2 -o results.xml,xunitxml
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test/matrixrain/results.xml

  qml-tests:
    name: "QML settings tests"
    runs-on: ubuntu-latest
    # QML tests import QtGraphicalEffects (GradientText) which needs a GL context.
    # xvfb + Mesa provides software-rendered GL on headless CI.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: ""

      - name: Install Mesa for software OpenGL
        run: sudo apt-get update && sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri

      - name: Build QML tests
        working-directory: test/qml
        run: |
          qmake matrixrain_qml_test.pro
          make -j$(nproc)

      - name: Run QML tests
        working-directory: test/qml
        run: xvfb-run --auto-servernum ./test_qml -v2 -o results.xml,xunitxml
        env:
          QT_QUICK_BACKEND: software

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-test-results
          path: test/qml/results.xml

  integration-tests:
    name: "Integration tests (QML)"
    runs-on: ubuntu-latest
    # Integration tests require OpenGL context (QSGGeometryNode rendering).
    # xvfb + Mesa provides a software-rendered GL context on headless CI.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: ""

      - name: Install Mesa for software OpenGL
        run: sudo apt-get update && sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri

      - name: Build integration tests
        working-directory: test/integration
        run: |
          qmake matrixrain_integration_test.pro "QMAKE_CXXFLAGS += -fsanitize=address -fno-omit-frame-pointer" "QMAKE_LFLAGS += -fsanitize=address"
          make -j$(nproc)

      - name: Run integration tests
        working-directory: test/integration
        run: xvfb-run --auto-servernum ./test_integration -v2 -o results.xml,xunitxml
        env:
          QT_QUICK_BACKEND: software
          ASAN_OPTIONS: detect_leaks=0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test/integration/results.xml
