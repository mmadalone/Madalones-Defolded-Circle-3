services:
  preview:
    build: .
    ports:
      - "5909:5900"
    volumes:
      # Relative path resolves against the compose file location
      # (test/matrixrain_preview/) — portable across Mac/Linux/Windows.
      # Replaced 2026-04-23 stale macOS absolute path post-Windows migration.
      - ../..:/app/sources
    environment:
      - QT_QPA_PLATFORM=xcb
      - LIBGL_ALWAYS_SOFTWARE=1
      - DISPLAY=:99
